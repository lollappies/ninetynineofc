<!-- ACCOUNT PAGE — Riwayat Pembelian -->
<div id="accountPage" style="display:none;position:fixed;inset:0;z-index:10004;background:#f5f5f5;overflow-y:auto;">
  <header style="position:sticky;top:0;background:#fff;z-index:10;border-bottom:1px solid #eee;box-shadow:0 1px 4px rgba(0,0,0,0.06);">
    <div style="max-width:680px;margin:0 auto;padding:0 16px;display:flex;align-items:center;height:56px;gap:12px;">
      <button onclick="closeAccountPage()" style="background:none;border:none;cursor:pointer;color:#555;padding:4px;display:flex;">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      </button>
      <span style="font-family:'Playfair Display',serif;font-size:17px;font-weight:500;flex:1;">Riwayat Pembelian</span>
      <button onclick="clearOrderHistory()" style="background:none;border:none;font-family:'DM Sans',sans-serif;font-size:11px;color:#D84040;cursor:pointer;padding:4px 8px;" title="Hapus semua riwayat">Hapus Semua</button>
    </div>
  </header>
  <div style="max-width:680px;margin:0 auto;padding:16px 16px 60px;">
    <div id="accountEmpty" style="display:none;text-align:center;padding:80px 20px;">
      <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="#ccc" stroke-width="1.5" style="margin-bottom:16px;"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <p style="font-family:'DM Sans',sans-serif;font-size:14px;color:#888;margin:0 0 4px;">Belum ada riwayat pembelian</p>
      <p style="font-family:'DM Sans',sans-serif;font-size:12px;color:#bbb;margin:0;">Pesanan yang selesai akan muncul di sini</p>
    </div>
    <div id="orderHistoryList" style="display:flex;flex-direction:column;gap:12px;"></div>
  </div>
</div>
